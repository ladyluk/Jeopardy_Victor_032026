<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="gameboard">
    <header class="gameboard-header">
        <div class="header-contestants">
            <div class="header-contestant-wrap">
                <img src="images/contestants/Vic.png" alt="Vic" class="header-contestant">
                <div id="score-vic" class="header-scoreboard">$0</div>
            </div>
            <div class="header-contestant-wrap">
                <img src="images/contestants/Skittles.png" alt="Skittles" class="header-contestant">
                <div id="score-skittles" class="header-scoreboard">$0</div>
            </div>
            <div class="header-contestant-wrap">
                <img src="images/contestants/Maverick.png" alt="Maverick" class="header-contestant">
                <div id="score-maverick" class="header-scoreboard">$0</div>
            </div>
        </div>
        <div class="round-buttons">
            <a href="/main" class="round-btn">Home</a>
            <a href="/teams" class="round-btn">Teams</a>
            <a href="?round=jeopardy" class="round-btn">Jeopardy</a>
            <a href="?round=double" class="round-btn">Double Jeopardy</a>
            <a href="?round=vic" class="round-btn">Vic jeopardy</a>
            <a href="/final" class="round-btn">Final Jeopardy</a>
        </div>
    </header>
    <table>
        <thead>
            <tr>
                <th></th><th></th><th></th><th></th><th></th><th></th><th></th>
            </tr>
        </thead>
        <tbody>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
    </table>
    <div id="clueModal" class="clue-modal" aria-hidden="true">
        <div class="clue-modal-content">
            <p id="clueModalText" class="clue-modal-text"></p>
            <div class="clue-modal-teams">
                <div class="clue-modal-team" data-team="vic">
                    <img src="images/contestants/Vic.png" alt="Vic" class="clue-modal-team-img">
                    <div class="clue-modal-buttons">
                        <button type="button" class="clue-modal-btn clue-modal-btn-win" aria-label="Correct">&check;</button>
                        <button type="button" class="clue-modal-btn clue-modal-btn-lose" aria-label="Wrong">&times;</button>
                    </div>
                </div>
                <div class="clue-modal-team" data-team="skittles">
                    <img src="images/contestants/Skittles.png" alt="Skittles" class="clue-modal-team-img">
                    <div class="clue-modal-buttons">
                        <button type="button" class="clue-modal-btn clue-modal-btn-win" aria-label="Correct">&check;</button>
                        <button type="button" class="clue-modal-btn clue-modal-btn-lose" aria-label="Wrong">&times;</button>
                    </div>
                </div>
                <div class="clue-modal-team" data-team="maverick">
                    <img src="images/contestants/Maverick.png" alt="Maverick" class="clue-modal-team-img">
                    <div class="clue-modal-buttons">
                        <button type="button" class="clue-modal-btn clue-modal-btn-win" aria-label="Correct">&check;</button>
                        <button type="button" class="clue-modal-btn clue-modal-btn-lose" aria-label="Wrong">&times;</button>
                    </div>
                </div>
            </div>
            <button type="button" class="clue-modal-close" aria-label="Close">&times;</button>
        </div>
    </div>
    <script>
        (function () {
            var roundKey = (function () {
                var params = new URLSearchParams(window.location.search);
                var round = params.get('round');
                if (round === 'double') return 'Double Jeopardy';
                if (round === 'vic') return 'Vic Jeopardy';
                return 'Jeopardy';
            })();

            Promise.all([
                fetch('/api/boot-id').then(function (r) { return r.json(); }),
                fetch('/answers.json').then(function (r) { return r.json(); })
            ]).then(function (results) {
                var bootData = results[0];
                var data = results[1];
                var stored = localStorage.getItem('jeopardy-boot-id');
                if (stored !== bootData.boot_id) {
                    ['vic', 'skittles', 'maverick'].forEach(function (team) {
                        localStorage.setItem('jeopardy-score-' + team, '0');
                    });
                    localStorage.removeItem('jeopardy-hidden-clues');
                    localStorage.setItem('jeopardy-boot-id', bootData.boot_id);
                }
                function getHiddenClues() {
                    try {
                        var raw = localStorage.getItem('jeopardy-hidden-clues');
                        return raw ? JSON.parse(raw) : [];
                    } catch (e) { return []; }
                }
                function addHiddenClue(roundKey, categoryName, valueKey) {
                    var key = roundKey + '|' + categoryName + '|' + valueKey;
                    var arr = getHiddenClues();
                    if (arr.indexOf(key) === -1) arr.push(key);
                    localStorage.setItem('jeopardy-hidden-clues', JSON.stringify(arr));
                }
                function isClueHidden(roundKey, categoryName, valueKey) {
                    return getHiddenClues().indexOf(roundKey + '|' + categoryName + '|' + valueKey) !== -1;
                }
                var roundData = data.categories && data.categories[roundKey];
                if (!roundData) return;
                var categoryNames = Object.keys(roundData);

                    var headers = document.querySelectorAll('body.gameboard thead th');
                    headers.forEach(function (th, i) {
                        th.textContent = categoryNames[i] || '';
                        th.classList.remove('category-header-orange');
                        var cat = roundData[categoryNames[i]];
                        if (cat && cat.color === 'orange') th.classList.add('category-header-orange');
                    });

                    var rows = document.querySelectorAll('body.gameboard tbody tr');
                    var maxRows = 0;
                    var valueKeysByCol = categoryNames.map(function (name) {
                        var cat = roundData[name];
                        var content = cat && cat.content;
                        var keys = content ? Object.keys(content) : [];
                        if (keys.length > maxRows) maxRows = keys.length;
                        return keys;
                    });

                    for (var r = 0; r < rows.length; r++) {
                        var cells = rows[r].querySelectorAll('td');
                        for (var c = 0; c < categoryNames.length; c++) {
                            var valueKeys = valueKeysByCol[c];
                            var valueKey = (r < valueKeys.length) ? valueKeys[r] : null;
                            if (cells[c]) {
                                var catName = categoryNames[c];
                                var hidden = valueKey && isClueHidden(roundKey, catName, valueKey);
                                cells[c].textContent = hidden ? '' : (valueKey || '');
                                if (valueKey && !hidden) {
                                    cells[c].classList.add('clue-cell');
                                    cells[c].setAttribute('data-category', catName);
                                    cells[c].setAttribute('data-value', valueKey);
                                }
                            }
                        }
                        for (var c = categoryNames.length; c < cells.length; c++) {
                            if (cells[c]) cells[c].textContent = '';
                        }
                    }

                    var modal = document.getElementById('clueModal');
                    var modalText = document.getElementById('clueModalText');
                    var closeBtn = modal && modal.querySelector('.clue-modal-close');
                    var activeClueCell = null;
                    function getStoredScore(team) {
                        var s = localStorage.getItem('jeopardy-score-' + team);
                        return s === null ? 0 : parseInt(s, 10) || 0;
                    }
                    function setStoredScore(team, value) {
                        localStorage.setItem('jeopardy-score-' + team, String(value));
                    }
                    var scores = {
                        vic: getStoredScore('vic'),
                        skittles: getStoredScore('skittles'),
                        maverick: getStoredScore('maverick')
                    };
                    var currentClueValue = 0;
                    ['vic', 'skittles', 'maverick'].forEach(function (team) {
                        var el = document.getElementById('score-' + team);
                        if (el) el.textContent = '$' + scores[team];
                    });

                    function parseValue(valueKey) {
                        var str = String(valueKey || '').replace(/[^0-9]/g, '');
                        return parseInt(str, 10) || 0;
                    }

                    function updateScoreboard(team, delta) {
                        if (scores[team] === undefined) return;
                        scores[team] += delta;
                        setStoredScore(team, scores[team]);
                        var el = document.getElementById('score-' + team);
                        if (el) el.textContent = '$' + scores[team];
                    }

                    function showClue(cell, categoryName, valueKey) {
                        var cat = roundData[categoryName];
                        var contentObj = cat && cat.content;
                        var item = contentObj && contentObj[valueKey];
                        var text = item && (item.Clue !== undefined ? item.Clue : item.clue);
                        if (modal && modalText && text !== undefined && text !== null) {
                            activeClueCell = cell;
                            currentClueValue = parseValue(valueKey);
                            modalText.textContent = text;
                            modal.classList.add('clue-modal-open');
                            modal.setAttribute('aria-hidden', 'false');
                        }
                    }

                    modal && modal.querySelectorAll('.clue-modal-team').forEach(function (wrap) {
                        var team = wrap.getAttribute('data-team');
                        var winBtn = wrap.querySelector('.clue-modal-btn-win');
                        var loseBtn = wrap.querySelector('.clue-modal-btn-lose');
                        if (winBtn) winBtn.addEventListener('click', function () { updateScoreboard(team, currentClueValue); hideClue(); });
                        if (loseBtn) loseBtn.addEventListener('click', function () { updateScoreboard(team, -currentClueValue); });
                    });

                    function hideClue() {
                        if (activeClueCell) {
                            var cat = activeClueCell.getAttribute('data-category');
                            var val = activeClueCell.getAttribute('data-value');
                            if (cat && val) addHiddenClue(roundKey, cat, val);
                            activeClueCell.textContent = '';
                            activeClueCell.classList.remove('clue-cell');
                            activeClueCell.removeAttribute('data-category');
                            activeClueCell.removeAttribute('data-value');
                            activeClueCell = null;
                        }
                        if (modal) {
                            modal.classList.remove('clue-modal-open');
                            modal.setAttribute('aria-hidden', 'true');
                        }
                    }

                    document.querySelectorAll('body.gameboard td.clue-cell').forEach(function (cell) {
                        cell.addEventListener('click', function () {
                            var cat = cell.getAttribute('data-category');
                            var val = cell.getAttribute('data-value');
                            if (cat && val) showClue(cell, cat, val);
                        });
                    });

                    if (closeBtn) closeBtn.addEventListener('click', hideClue);
                    if (modal) modal.addEventListener('click', function (e) {
                        if (e.target === modal) hideClue();
                    });
                })
                .catch(function () { });
        })();
    </script>
</body>
</html>
