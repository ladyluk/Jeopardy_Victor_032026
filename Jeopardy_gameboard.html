<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="gameboard">
    <header class="gameboard-header">
        <div class="header-contestants">
            <div class="header-contestant-wrap">
                <img src="images/contestants/Vic.png" alt="Vic" class="header-contestant">
                <div id="score-vic" class="header-scoreboard">$0</div>
            </div>
            <div class="header-contestant-wrap">
                <img src="images/contestants/Skittles.png" alt="Skittles" class="header-contestant">
                <div id="score-skittles" class="header-scoreboard">$0</div>
            </div>
            <div class="header-contestant-wrap">
                <img src="images/contestants/Maverick.png" alt="Maverick" class="header-contestant">
                <div id="score-maverick" class="header-scoreboard">$0</div>
            </div>
        </div>
        <div class="round-buttons">
            <a href="/main" class="round-btn">Home</a>
            <a href="/teams" class="round-btn">Teams</a>
            <a href="?round=jeopardy" class="round-btn">Jeopardy</a>
            <a href="?round=double" class="round-btn">Double Jeopardy</a>
            <a href="?round=vic" class="round-btn">Vic jeopardy</a>
            <a href="/final" class="round-btn">Final Jeopardy</a>
        </div>
        <button type="button" id="gameboard-undo-clue-btn" class="gameboard-header-undo-btn" aria-label="Restore last clue">Undo</button>
    </header>
    <table>
        <thead>
            <tr>
                <th></th><th></th><th></th><th></th><th></th><th></th><th></th>
            </tr>
        </thead>
        <tbody>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
    </table>
    <div id="clueModal" class="clue-modal" aria-hidden="true">
        <div class="clue-modal-content">
            <p id="clueModalText" class="clue-modal-text"></p>
            <div id="clueModalAudio" class="clue-modal-audio" aria-hidden="true">
                <div class="final-timer-wrap clue-modal-audio-pill">
                    <button type="button" id="clueModalAudioPlayBtn" class="final-timer-play-btn" aria-label="Play">&#9654;</button>
                </div>
            </div>
            <div id="clueModalVideo" class="clue-modal-video" aria-hidden="true"></div>
            <div id="clueModalImages" class="clue-modal-images" aria-hidden="true"></div>
            <div class="clue-modal-teams">
                <div class="clue-modal-team" data-team="vic">
                    <img src="images/contestants/Vic.png" alt="Vic" class="clue-modal-team-img">
                    <div class="clue-modal-buttons">
                        <button type="button" class="clue-modal-btn clue-modal-btn-win" aria-label="Correct">&check;</button>
                        <button type="button" class="clue-modal-btn clue-modal-btn-lose" aria-label="Wrong">&times;</button>
                    </div>
                    <div class="clue-modal-daily-double-wrap">
                        <input type="text" class="clue-modal-daily-double-input" placeholder="">
                        <div class="clue-modal-daily-double-btns">
                            <button type="button" class="clue-modal-btn clue-modal-btn-win clue-modal-daily-double-plus" aria-label="Add to score">&check;</button>
                            <button type="button" class="clue-modal-btn clue-modal-btn-lose clue-modal-daily-double-minus" aria-label="Subtract from score">&times;</button>
                        </div>
                    </div>
                </div>
                <div class="clue-modal-team" data-team="skittles">
                    <img src="images/contestants/Skittles.png" alt="Skittles" class="clue-modal-team-img">
                    <div class="clue-modal-buttons">
                        <button type="button" class="clue-modal-btn clue-modal-btn-win" aria-label="Correct">&check;</button>
                        <button type="button" class="clue-modal-btn clue-modal-btn-lose" aria-label="Wrong">&times;</button>
                    </div>
                    <div class="clue-modal-daily-double-wrap">
                        <input type="text" class="clue-modal-daily-double-input" placeholder="">
                        <div class="clue-modal-daily-double-btns">
                            <button type="button" class="clue-modal-btn clue-modal-btn-win clue-modal-daily-double-plus" aria-label="Add to score">&check;</button>
                            <button type="button" class="clue-modal-btn clue-modal-btn-lose clue-modal-daily-double-minus" aria-label="Subtract from score">&times;</button>
                        </div>
                    </div>
                </div>
                <div class="clue-modal-team" data-team="maverick">
                    <img src="images/contestants/Maverick.png" alt="Maverick" class="clue-modal-team-img">
                    <div class="clue-modal-buttons">
                        <button type="button" class="clue-modal-btn clue-modal-btn-win" aria-label="Correct">&check;</button>
                        <button type="button" class="clue-modal-btn clue-modal-btn-lose" aria-label="Wrong">&times;</button>
                    </div>
                    <div class="clue-modal-daily-double-wrap">
                        <input type="text" class="clue-modal-daily-double-input" placeholder="">
                        <div class="clue-modal-daily-double-btns">
                            <button type="button" class="clue-modal-btn clue-modal-btn-win clue-modal-daily-double-plus" aria-label="Add to score">&check;</button>
                            <button type="button" class="clue-modal-btn clue-modal-btn-lose clue-modal-daily-double-minus" aria-label="Subtract from score">&times;</button>
                        </div>
                    </div>
                </div>
                <div class="clue-modal-5sec-wrap">
                    <button type="button" id="clueModal5SecBtn" class="clue-modal-5sec-btn" aria-label="Start 5 second timer">
                        <span class="clue-modal-5sec-dial" aria-hidden="true"></span>
                        <span class="clue-modal-5sec-hand" aria-hidden="true"></span>
                        <span id="clueModal5SecDisplay" class="clue-modal-5sec-display" aria-live="polite"></span>
                        <span class="clue-modal-5sec-idle-label">5 sec</span>
                    </button>
                </div>
            </div>
            <button type="button" class="clue-modal-close" aria-label="Close">&times;</button>
        </div>
    </div>
    <div id="dailyDoubleModal" class="daily-double-modal" aria-hidden="true" title="Click to continue to clue">
        <img src="images/jeopardy_background_pics/Daily_Double.PNG" alt="Daily Double" class="daily-double-img">
    </div>
    <script>
        (function () {
            var roundKey = (function () {
                var params = new URLSearchParams(window.location.search);
                var round = params.get('round');
                if (round === 'double') return 'Double Jeopardy';
                if (round === 'vic') return 'Vic Jeopardy';
                return 'Jeopardy';
            })();

            Promise.all([
                fetch('/api/boot-id').then(function (r) { return r.json(); }),
                fetch('/answers.json').then(function (r) { return r.json(); })
            ]).then(function (results) {
                var bootData = results[0];
                var data = results[1];
                var stored = localStorage.getItem('jeopardy-boot-id');
                if (stored !== bootData.boot_id) {
                    ['vic', 'skittles', 'maverick'].forEach(function (team) {
                        localStorage.setItem('jeopardy-score-' + team, '0');
                    });
                    localStorage.removeItem('jeopardy-hidden-clues');
                    localStorage.setItem('jeopardy-boot-id', bootData.boot_id);
                }
                var clueUndoStack = [];
                function getHiddenClues() {
                    try {
                        var raw = localStorage.getItem('jeopardy-hidden-clues');
                        return raw ? JSON.parse(raw) : [];
                    } catch (e) { return []; }
                }
                function addHiddenClue(roundKey, categoryName, valueKey) {
                    var key = roundKey + '|' + categoryName + '|' + valueKey;
                    var arr = getHiddenClues();
                    if (arr.indexOf(key) === -1) arr.push(key);
                    localStorage.setItem('jeopardy-hidden-clues', JSON.stringify(arr));
                }
                function isClueHidden(roundKey, categoryName, valueKey) {
                    return getHiddenClues().indexOf(roundKey + '|' + categoryName + '|' + valueKey) !== -1;
                }
                function removeHiddenClueByKey(key) {
                    var arr = getHiddenClues();
                    var i = arr.indexOf(key);
                    if (i === -1) return false;
                    arr.splice(i, 1);
                    localStorage.setItem('jeopardy-hidden-clues', JSON.stringify(arr));
                    return true;
                }
                var roundData = data.categories && data.categories[roundKey];
                if (!roundData) return;
                var categoryNames = Object.keys(roundData);

                    var headers = document.querySelectorAll('body.gameboard thead th');
                    headers.forEach(function (th, i) {
                        th.textContent = categoryNames[i] || '';
                        th.classList.remove('category-header-orange');
                        var cat = roundData[categoryNames[i]];
                        if (cat && cat.color === 'orange') th.classList.add('category-header-orange');
                    });

                    var rows = document.querySelectorAll('body.gameboard tbody tr');
                    var maxRows = 0;
                    var valueKeysByCol = categoryNames.map(function (name) {
                        var cat = roundData[name];
                        var content = cat && cat.content;
                        var keys = content ? Object.keys(content) : [];
                        if (keys.length > maxRows) maxRows = keys.length;
                        return keys;
                    });

                    function refreshGameboardCells() {
                        for (var r = 0; r < rows.length; r++) {
                            var cells = rows[r].querySelectorAll('td');
                            for (var c = 0; c < categoryNames.length; c++) {
                                var valueKeys = valueKeysByCol[c];
                                var valueKey = (r < valueKeys.length) ? valueKeys[r] : null;
                                if (cells[c]) {
                                    var catName = categoryNames[c];
                                    var hidden = valueKey && isClueHidden(roundKey, catName, valueKey);
                                    cells[c].textContent = hidden ? '' : (valueKey || '');
                                    cells[c].classList.remove('clue-cell');
                                    cells[c].removeAttribute('data-category');
                                    cells[c].removeAttribute('data-value');
                                    if (valueKey && !hidden) {
                                        cells[c].classList.add('clue-cell');
                                        cells[c].setAttribute('data-category', catName);
                                        cells[c].setAttribute('data-value', valueKey);
                                    }
                                }
                            }
                            for (var c = categoryNames.length; c < cells.length; c++) {
                                if (cells[c]) cells[c].textContent = '';
                            }
                        }
                    }
                    refreshGameboardCells();

                    var modal = document.getElementById('clueModal');
                    var modalText = document.getElementById('clueModalText');
                    var closeBtn = modal && modal.querySelector('.clue-modal-close');
                    var activeClueCell = null;
                    function getStoredScore(team) {
                        var s = localStorage.getItem('jeopardy-score-' + team);
                        return s === null ? 0 : parseInt(s, 10) || 0;
                    }
                    function setStoredScore(team, value) {
                        localStorage.setItem('jeopardy-score-' + team, String(value));
                    }
                    var scores = {
                        vic: getStoredScore('vic'),
                        skittles: getStoredScore('skittles'),
                        maverick: getStoredScore('maverick')
                    };
                    var currentClueValue = 0;
                    ['vic', 'skittles', 'maverick'].forEach(function (team) {
                        var el = document.getElementById('score-' + team);
                        if (el) el.textContent = '$' + scores[team];
                    });

                    function parseValue(valueKey) {
                        var str = String(valueKey || '').replace(/[^0-9]/g, '');
                        return parseInt(str, 10) || 0;
                    }

                    function updateScoreboard(team, delta) {
                        if (scores[team] === undefined) return;
                        scores[team] += delta;
                        setStoredScore(team, scores[team]);
                        var el = document.getElementById('score-' + team);
                        if (el) el.textContent = '$' + scores[team];
                    }

                    var dailyDoubleModal = document.getElementById('dailyDoubleModal');
                    var pendingClueAfterDailyDouble = null;

                    var clueModalImages = document.getElementById('clueModalImages');
                    var clueModalVideo = document.getElementById('clueModalVideo');
                    var clueModalAudio = document.getElementById('clueModalAudio');
                    var clueModalAudioPlayBtn = document.getElementById('clueModalAudioPlayBtn');
                    var clueModalAudioPlayer = null;
                    var clueModalAudioStopTimeout = null;
                    var clueModal5SecRafId = null;
                    var CLUE_AUDIO_MAX_SECONDS = 10;
                    var imageBasePath = '/images/trip_pics/';

                    function toEmbedVideoUrl(url) {
                        if (!url || typeof url !== 'string') return '';
                        var u = url.trim();
                        var m = u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
                        if (m) return 'https://www.youtube.com/embed/' + m[1];
                        if (u.indexOf('youtube.com/embed/') !== -1 || u.indexOf('vimeo.com/') !== -1) return u;
                        return u;
                    }

                    function showClue(cell, categoryName, valueKey, isDailyDouble) {
                        var cat = roundData[categoryName];
                        var contentObj = cat && cat.content;
                        var item = contentObj && contentObj[valueKey];
                        if (!modal || !item) return;
                        activeClueCell = cell;
                        currentClueValue = parseValue(valueKey);
                        if (isDailyDouble) {
                            modal.classList.add('clue-modal-daily-double');
                            modal.querySelectorAll('.clue-modal-daily-double-input').forEach(function (input) { input.value = ''; });
                        } else {
                            modal.classList.remove('clue-modal-daily-double');
                        }
                        var text = item.Clue !== undefined ? item.Clue : item.clue;
                        var hasText = text !== undefined && text !== null && String(text).trim() !== '';
                        var imageSrc = item.image_src;
                        var isImageArray = Array.isArray(imageSrc) && imageSrc.length > 0;
                        var isSingleImage = !isImageArray && imageSrc !== undefined && imageSrc !== null && String(imageSrc).trim() !== '';
                        var hasImages = isImageArray || isSingleImage;

                        if (modalText) {
                            if (hasText) {
                                modalText.textContent = text;
                                modalText.style.display = '';
                            } else {
                                modalText.textContent = '';
                                modalText.style.display = 'none';
                            }
                        }
                        var audioFileName = item.audio_file_name;
                        var hasAudio = audioFileName !== undefined && audioFileName !== null && String(audioFileName).trim() !== '';
                        if (clueModalAudio && clueModalAudioPlayBtn) {
                            if (clueModalAudioPlayer) {
                                clueModalAudioPlayer.pause();
                                clueModalAudioPlayer = null;
                            }
                            if (hasAudio) {
                                var audioSrc = String(audioFileName).trim();
                                if (audioSrc.indexOf('/') !== 0) audioSrc = '/' + audioSrc;
                                clueModalAudioPlayer = new Audio(audioSrc);
                                clueModalAudioPlayer.addEventListener('ended', onClueAudioEnded);
                                clueModalAudioPlayBtn.textContent = '\u25B6';
                                clueModalAudioPlayBtn.setAttribute('aria-label', 'Play');
                                clueModalAudio.setAttribute('aria-hidden', 'false');
                                clueModalAudio.style.display = 'block';
                            } else {
                                clueModalAudio.setAttribute('aria-hidden', 'true');
                                clueModalAudio.style.display = 'none';
                            }
                        }
                        var videoUrl = item.video_url;
                        var hasVideo = videoUrl !== undefined && videoUrl !== null && String(videoUrl).trim() !== '';
                        if (clueModalVideo) {
                            clueModalVideo.innerHTML = '';
                            if (hasVideo) {
                                var embedUrl = toEmbedVideoUrl(videoUrl);
                                if (embedUrl) {
                                    var iframe = document.createElement('iframe');
                                    iframe.src = embedUrl;
                                    iframe.className = 'clue-modal-video-iframe';
                                    iframe.setAttribute('title', 'Video clue');
                                    clueModalVideo.appendChild(iframe);
                                    clueModalVideo.setAttribute('aria-hidden', 'false');
                                    clueModalVideo.style.display = 'block';
                                } else {
                                    clueModalVideo.setAttribute('aria-hidden', 'true');
                                    clueModalVideo.style.display = 'none';
                                }
                            } else {
                                clueModalVideo.setAttribute('aria-hidden', 'true');
                                clueModalVideo.style.display = 'none';
                            }
                        }
                        if (clueModalImages) {
                            clueModalImages.innerHTML = '';
                            if (hasImages) {
                                clueModalImages.setAttribute('aria-hidden', 'false');
                                clueModalImages.style.display = 'flex';
                                if (isImageArray) {
                                    imageSrc.forEach(function (filename) {
                                        var img = document.createElement('img');
                                        img.src = imageBasePath + String(filename).trim();
                                        img.alt = '';
                                        img.className = 'clue-modal-image';
                                        clueModalImages.appendChild(img);
                                    });
                                } else {
                                    var img = document.createElement('img');
                                    var src = String(imageSrc).trim().replace(/^["']|["']$/g, '').replace(/\\/g, '/');
                                    if (src.indexOf('/') !== 0 && src.indexOf('http') !== 0 && src.indexOf('https') !== 0) src = '/' + src;
                                    img.src = src;
                                    img.alt = '';
                                    img.className = 'clue-modal-image';
                                    clueModalImages.appendChild(img);
                                }
                            } else {
                                clueModalImages.setAttribute('aria-hidden', 'true');
                                clueModalImages.style.display = 'none';
                            }
                        }
                        modal.classList.add('clue-modal-open');
                        modal.setAttribute('aria-hidden', 'false');
                    }

                    if (clueModalAudioPlayBtn) {
                        clueModalAudioPlayBtn.addEventListener('click', function () {
                            if (!clueModalAudioPlayer) return;
                            if (clueModalAudioPlayer.paused) {
                                if (clueModalAudioStopTimeout) clearTimeout(clueModalAudioStopTimeout);
                                clueModalAudioPlayer.currentTime = 0;
                                clueModalAudioPlayer.play();
                                clueModalAudioPlayBtn.textContent = '\u23F8';
                                clueModalAudioPlayBtn.setAttribute('aria-label', 'Pause');
                                clueModalAudioStopTimeout = setTimeout(function () {
                                    clueModalAudioStopTimeout = null;
                                    clueModalAudioPlayer.pause();
                                    clueModalAudioPlayBtn.textContent = '\u25B6';
                                    clueModalAudioPlayBtn.setAttribute('aria-label', 'Play');
                                }, CLUE_AUDIO_MAX_SECONDS * 1000);
                            } else {
                                if (clueModalAudioStopTimeout) {
                                    clearTimeout(clueModalAudioStopTimeout);
                                    clueModalAudioStopTimeout = null;
                                }
                                clueModalAudioPlayer.pause();
                                clueModalAudioPlayBtn.textContent = '\u25B6';
                                clueModalAudioPlayBtn.setAttribute('aria-label', 'Play');
                            }
                        });
                    }
                    function onClueAudioEnded() {
                        if (clueModalAudioPlayBtn) {
                                clueModalAudioPlayBtn.textContent = '\u25B6';
                                clueModalAudioPlayBtn.setAttribute('aria-label', 'Play');
                        }
                    }

                    var dailyDoubleAudio = new Audio('audio/jeopardy-daily-double.mp3');

                    function showDailyDoubleThenClue(cell, categoryName, valueKey) {
                        pendingClueAfterDailyDouble = { cell: cell, categoryName: categoryName, valueKey: valueKey };
                        if (dailyDoubleModal) {
                            dailyDoubleModal.classList.add('daily-double-modal-open');
                            dailyDoubleModal.setAttribute('aria-hidden', 'false');
                        }
                        if (dailyDoubleAudio) dailyDoubleAudio.play().catch(function () {});
                    }

                    function hideDailyDoubleAndShowClue() {
                        if (!dailyDoubleModal) return;
                        dailyDoubleModal.classList.remove('daily-double-modal-open');
                        dailyDoubleModal.setAttribute('aria-hidden', 'true');
                        if (pendingClueAfterDailyDouble) {
                            var p = pendingClueAfterDailyDouble;
                            pendingClueAfterDailyDouble = null;
                            showClue(p.cell, p.categoryName, p.valueKey, true);
                        }
                    }

                    function cancelClue5SecRaf() {
                        if (clueModal5SecRafId) {
                            cancelAnimationFrame(clueModal5SecRafId);
                            clueModal5SecRafId = null;
                        }
                    }

                    function setClue5SecClockProgress(btn, p) {
                        if (!btn) return;
                        var clamped = Math.max(0, Math.min(1, p));
                        btn.style.setProperty('--clock-p', String(clamped));
                        var hand = btn.querySelector('.clue-modal-5sec-hand');
                        if (hand) hand.style.transform = 'translateX(-50%) rotate(' + (clamped * 360) + 'deg)';
                    }

                    function resetClue5SecTimerIdle() {
                        var btn = document.getElementById('clueModal5SecBtn');
                        var el = document.getElementById('clueModal5SecDisplay');
                        cancelClue5SecRaf();
                        if (btn) {
                            btn.classList.remove('clue-modal-5sec-running');
                            setClue5SecClockProgress(btn, 0);
                        }
                        if (el) el.textContent = '';
                    }

                    function restartClue5SecTimer() {
                        var btn = document.getElementById('clueModal5SecBtn');
                        var el = document.getElementById('clueModal5SecDisplay');
                        if (!btn || !el) return;
                        cancelClue5SecRaf();
                        btn.classList.add('clue-modal-5sec-running');
                        var start = performance.now();
                        function tick(now) {
                            var elapsed = now - start;
                            if (elapsed >= 5000) {
                                clueModal5SecRafId = null;
                                setClue5SecClockProgress(btn, 1);
                                el.textContent = '';
                                btn.classList.remove('clue-modal-5sec-running');
                                var timesUp = new Audio('/audio/times-up.mp3');
                                timesUp.play().catch(function () {});
                                return;
                            }
                            setClue5SecClockProgress(btn, elapsed / 5000);
                            el.textContent = String(Math.ceil((5000 - elapsed) / 1000));
                            clueModal5SecRafId = requestAnimationFrame(tick);
                        }
                        clueModal5SecRafId = requestAnimationFrame(tick);
                    }

                    modal && modal.querySelectorAll('.clue-modal-team').forEach(function (wrap) {
                        var team = wrap.getAttribute('data-team');
                        var winBtn = wrap.querySelector('.clue-modal-buttons .clue-modal-btn-win');
                        var loseBtn = wrap.querySelector('.clue-modal-buttons .clue-modal-btn-lose');
                        if (winBtn) winBtn.addEventListener('click', function () { updateScoreboard(team, currentClueValue); hideClue(); });
                        if (loseBtn) loseBtn.addEventListener('click', function () { resetClue5SecTimerIdle(); updateScoreboard(team, -currentClueValue); });
                        var ddWrap = wrap.querySelector('.clue-modal-daily-double-wrap');
                        if (ddWrap) {
                            var input = ddWrap.querySelector('.clue-modal-daily-double-input');
                            var minusBtn = ddWrap.querySelector('.clue-modal-daily-double-minus');
                            var plusBtn = ddWrap.querySelector('.clue-modal-daily-double-plus');
                            function parseInputValue() {
                                var raw = input ? input.value.replace(/[$,]/g, '').trim() : '';
                                var n = parseInt(raw, 10);
                                return isNaN(n) ? 0 : n;
                            }
                            if (minusBtn) minusBtn.addEventListener('click', function () { resetClue5SecTimerIdle(); updateScoreboard(team, -parseInputValue()); });
                            if (plusBtn) plusBtn.addEventListener('click', function () { restartClue5SecTimer(); updateScoreboard(team, parseInputValue()); });
                        }
                    });

                    function hideClue() {
                        if (activeClueCell) {
                            var cat = activeClueCell.getAttribute('data-category');
                            var val = activeClueCell.getAttribute('data-value');
                            if (cat && val) {
                                addHiddenClue(roundKey, cat, val);
                                clueUndoStack.push(roundKey + '|' + cat + '|' + val);
                            }
                            activeClueCell.textContent = '';
                            activeClueCell.classList.remove('clue-cell');
                            activeClueCell.removeAttribute('data-category');
                            activeClueCell.removeAttribute('data-value');
                            activeClueCell = null;
                        }
                        if (modal) {
                            modal.classList.remove('clue-modal-open', 'clue-modal-daily-double');
                            modal.setAttribute('aria-hidden', 'true');
                        }
                        if (modalText) modalText.style.display = '';
                        if (clueModalAudioStopTimeout) {
                            clearTimeout(clueModalAudioStopTimeout);
                            clueModalAudioStopTimeout = null;
                        }
                        if (clueModalAudioPlayer) {
                            clueModalAudioPlayer.pause();
                            clueModalAudioPlayer = null;
                        }
                        if (clueModalAudio) {
                            clueModalAudio.setAttribute('aria-hidden', 'true');
                            clueModalAudio.style.display = 'none';
                        }
                        if (clueModalVideo) {
                            clueModalVideo.innerHTML = '';
                            clueModalVideo.setAttribute('aria-hidden', 'true');
                            clueModalVideo.style.display = 'none';
                        }
                        if (clueModalImages) {
                            clueModalImages.innerHTML = '';
                            clueModalImages.setAttribute('aria-hidden', 'true');
                            clueModalImages.style.display = 'none';
                        }
                        resetClue5SecTimerIdle();
                    }

                    var fiveSecBtn = document.getElementById('clueModal5SecBtn');
                    if (fiveSecBtn) {
                        fiveSecBtn.addEventListener('click', function () { restartClue5SecTimer(); });
                    }

                    var tbody = document.querySelector('body.gameboard table tbody');
                    if (tbody) {
                        tbody.addEventListener('click', function (e) {
                            var cell = e.target.closest('td');
                            if (!cell || !cell.classList.contains('clue-cell')) return;
                            var cat = cell.getAttribute('data-category');
                            var val = cell.getAttribute('data-value');
                            if (!cat || !val) return;
                            var catData = roundData[cat];
                            var contentObj = catData && catData.content;
                            var item = contentObj && contentObj[val];
                            var isDailyDouble = item && (item.Daily_double === true || item.daily_double === true);
                            if (isDailyDouble) showDailyDoubleThenClue(cell, cat, val);
                            else showClue(cell, cat, val);
                        });
                    }

                    var undoClueBtn = document.getElementById('gameboard-undo-clue-btn');
                    if (undoClueBtn) {
                        undoClueBtn.addEventListener('click', function () {
                            if (!clueUndoStack.length) return;
                            var key = clueUndoStack.pop();
                            removeHiddenClueByKey(key);
                            refreshGameboardCells();
                        });
                    }

                    if (dailyDoubleModal) dailyDoubleModal.addEventListener('click', hideDailyDoubleAndShowClue);

                    if (closeBtn) closeBtn.addEventListener('click', hideClue);
                    if (modal) modal.addEventListener('click', function (e) {
                        if (e.target === modal) hideClue();
                    });
                })
                .catch(function () { });
        })();
    </script>
</body>
</html>
