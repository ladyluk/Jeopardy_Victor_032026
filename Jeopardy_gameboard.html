<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="gameboard">
    <header class="gameboard-header">
        <div class="header-contestants">
            <div class="header-contestant-wrap">
                <img src="images/contestants/Vic.png" alt="Vic" class="header-contestant">
                <div class="header-scoreboard">$0</div>
            </div>
            <div class="header-contestant-wrap">
                <img src="images/contestants/Skittles.png" alt="Skittles" class="header-contestant">
                <div class="header-scoreboard">$0</div>
            </div>
            <div class="header-contestant-wrap">
                <img src="images/contestants/Maverick.png" alt="Maverick" class="header-contestant">
                <div class="header-scoreboard">$0</div>
            </div>
        </div>
        <div class="round-buttons">
            <a href="/" class="round-btn">Home</a>
            <a href="/teams" class="round-btn">Teams</a>
            <a href="?round=jeopardy" class="round-btn">Jeopardy</a>
            <a href="?round=double" class="round-btn">Double Jeopardy</a>
            <a href="?round=vic" class="round-btn">Vic jeopardy</a>
            <a href="/final" class="round-btn">Final Jeopardy</a>
        </div>
    </header>
    <table>
        <thead>
            <tr>
                <th></th><th></th><th></th><th></th><th></th><th></th><th></th>
            </tr>
        </thead>
        <tbody>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
            <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
    </table>
    <div id="clueModal" class="clue-modal" aria-hidden="true">
        <div class="clue-modal-content">
            <p id="clueModalText" class="clue-modal-text"></p>
            <button type="button" class="clue-modal-close" aria-label="Close">&times;</button>
        </div>
    </div>
    <script>
        (function () {
            var roundKey = (function () {
                var params = new URLSearchParams(window.location.search);
                var round = params.get('round');
                if (round === 'double') return 'Double Jeopardy';
                if (round === 'vic') return 'Vic Jeopardy';
                return 'Jeopardy';
            })();

            fetch('/answers.json')
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    var roundData = data.categories && data.categories[roundKey];
                    if (!roundData) return;
                    var categoryNames = Object.keys(roundData);

                    var headers = document.querySelectorAll('body.gameboard thead th');
                    headers.forEach(function (th, i) {
                        th.textContent = categoryNames[i] || '';
                    });

                    var rows = document.querySelectorAll('body.gameboard tbody tr');
                    var maxRows = 0;
                    var valueKeysByCol = categoryNames.map(function (name) {
                        var cat = roundData[name];
                        var content = cat && cat.content;
                        var keys = content ? Object.keys(content) : [];
                        if (keys.length > maxRows) maxRows = keys.length;
                        return keys;
                    });

                    for (var r = 0; r < rows.length; r++) {
                        var cells = rows[r].querySelectorAll('td');
                        for (var c = 0; c < categoryNames.length; c++) {
                            var valueKeys = valueKeysByCol[c];
                            var valueKey = (r < valueKeys.length) ? valueKeys[r] : null;
                            if (cells[c]) {
                                cells[c].textContent = valueKey || '';
                                if (valueKey) {
                                    cells[c].classList.add('clue-cell');
                                    cells[c].setAttribute('data-category', categoryNames[c]);
                                    cells[c].setAttribute('data-value', valueKey);
                                }
                            }
                        }
                        for (var c = categoryNames.length; c < cells.length; c++) {
                            if (cells[c]) cells[c].textContent = '';
                        }
                    }

                    var modal = document.getElementById('clueModal');
                    var modalText = document.getElementById('clueModalText');
                    var closeBtn = modal && modal.querySelector('.clue-modal-close');
                    var activeClueCell = null;

                    function showClue(cell, categoryName, valueKey) {
                        var cat = roundData[categoryName];
                        var contentObj = cat && cat.content;
                        var text = contentObj && contentObj[valueKey];
                        if (modal && modalText && text !== undefined) {
                            activeClueCell = cell;
                            modalText.textContent = text;
                            modal.classList.add('clue-modal-open');
                            modal.setAttribute('aria-hidden', 'false');
                        }
                    }

                    function hideClue() {
                        if (activeClueCell) {
                            activeClueCell.textContent = '';
                            activeClueCell.classList.remove('clue-cell');
                            activeClueCell.removeAttribute('data-category');
                            activeClueCell.removeAttribute('data-value');
                            activeClueCell = null;
                        }
                        if (modal) {
                            modal.classList.remove('clue-modal-open');
                            modal.setAttribute('aria-hidden', 'true');
                        }
                    }

                    document.querySelectorAll('body.gameboard td.clue-cell').forEach(function (cell) {
                        cell.addEventListener('click', function () {
                            var cat = cell.getAttribute('data-category');
                            var val = cell.getAttribute('data-value');
                            if (cat && val) showClue(cell, cat, val);
                        });
                    });

                    if (closeBtn) closeBtn.addEventListener('click', hideClue);
                    if (modal) modal.addEventListener('click', function (e) {
                        if (e.target === modal) hideClue();
                    });
                })
                .catch(function () { });
        })();
    </script>
</body>
</html>
