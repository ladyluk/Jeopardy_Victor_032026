<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button type="button" class="reset-btn" id="reset-clues-btn">Reset</button>
    <a href="/teams" class="begin-btn" id="begin-btn">Begin</a>
    <iframe id="teams-iframe" class="teams-iframe" title="Teams"></iframe>
    <script>
        document.getElementById('reset-clues-btn').addEventListener('click', function () {
            try {
                localStorage.removeItem('jeopardy-hidden-clues');
            } catch (e) {}
            alert('Board reset. All clue values will show again when you open the gameboard.');
        });
        document.getElementById('begin-btn').addEventListener('click', function (e) {
            e.preventDefault();
            var intro = new Audio('audio/jeopardy-intro-1.mp3');
            intro.play().catch(function () {});
            setTimeout(function () {
                var iframe = document.getElementById('teams-iframe');
                iframe.src = '/teams';
                iframe.classList.add('teams-iframe-visible');
                document.getElementById('reset-clues-btn').style.visibility = 'hidden';
                document.getElementById('begin-btn').style.visibility = 'hidden';
            }, 10000);
        });
    </script>
</body>
</html>
